<div class="container-fluid">

  <!-- ===== HEADER ===== -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <h3 class="fw-bold mb-0">
      <i class="bi bi-receipt"></i> Quản lý đơn hàng
    </h3>
  </div>

  <!-- ===== FILTER ===== -->
  <div class="card shadow-sm mb-4">
    <div class="card-body d-flex align-items-center gap-3 flex-wrap">
      <label class="fw-semibold mb-0">Trạng thái:</label>

      <select id="order-status" class="form-select w-auto">
        <option value="confirmed">✅ Đơn hàng đã bán</option>
        <option value="cancelled">↩️ Đơn huỷ / hoàn</option>
        <option value="draft">📝 Đơn nháp</option>
      </select>
    </div>
  </div>

  <!-- ===== TABLE ===== -->
  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th style="width:120px">Mã đơn</th>
              <th>Ngày tạo</th>
              <th style="width:160px">Tổng tiền</th>
              <th style="width:180px">Hành động</th>
            </tr>
          </thead>
          <tbody id="orders-body">
            <!-- JS render -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- JS -->
<script src="/static/js/orders_manage.js"></script>
