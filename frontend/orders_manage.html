<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Quản lý đơn hàng</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- CSS hệ thống -->
  <link rel="stylesheet" href="/static/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/static/css/style.css">

  <style>
    body { background: #f4f6f9; }
    .card { border-radius: 14px; }
    .table th { background: #f1f3f5; }
  </style>
</head>
<body>

<div class="container-fluid p-4">

  <!-- ===== TITLE ===== -->
  <h3 class="fw-bold text-primary mb-4">
    <a href="/index.html">
      ← Quản lý đơn hàng
    </a>
  </h3>

  <!-- ===== FILTER ===== -->
  <div class="card shadow-sm mb-4">
    <div class="card-body row g-3 align-items-end">

      <div class="col-md-3">
        <label class="fw-semibold">Trạng thái</label>
        <select id="order-status" class="form-select w-auto">
          <option value="confirmed">✅ Đơn hàng đã bán</option>
          <option value="cancelled">↩️ Đơn huỷ / hoàn</option>
          <option value="draft">📝 Đơn nháp</option>
        </select>
      </div>

      <div class="col-md-3">
        <label class="fw-semibold">Từ ngày</label>
        <input type="date" id="date-from" class="form-control">
      </div>

      <div class="col-md-3">
        <label class="fw-semibold">Đến ngày</label>
        <input type="date" id="date-to" class="form-control">
      </div>

      <div class="col-md-3">
        <button class="btn btn-primary w-100" id="btn-filter">
          <i class="bi bi-funnel"></i> Lọc dữ liệu
        </button>
      </div>

    </div>
  </div>

  <!-- ===== TABLE ===== -->
  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th>Mã đơn</th>
            <th>Ngày tạo</th>
            <th class="text-end">Tổng tiền</th>
            <th class="text-center">Trạng thái</th>
            <th class="text-center">Hành động</th>
          </tr>
        </thead>
        <tbody id="orders-body">
          <tr>
            <td colspan="5" class="text-center text-muted py-4">
              Đang tải dữ liệu...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ===== PAGINATION ===== -->
  <nav class="mt-4">
    <ul class="pagination justify-content-center" id="pagination">
      <!-- JS render -->
    </ul>
  </nav>

</div>

<!-- ===== JS ===== -->
<!-- <script src="/static/js/bootstrap.bundle.min.js"></script> -->
<script src="/static/js/auth.js"></script>
<script src="/static/js/orders_manage.js"></script>

</body>
</html>
